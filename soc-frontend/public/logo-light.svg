  <!-- wordmark — fixed dark for light backgrounds -->
  <text x="92" y="46"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="700"
        fill="#1a1c2e" letter-spacing="-0.5">Nexus<tspan fill="url(#nx)">SOC</tspan></text>
  <text x="93" y="63"
        font-family="ui-monospace, 'SF Mono', Menlo, 'Cascadia Code', monospace"
        font-size="9" fill="#1a1c2e" opacity="0.55" letter-spacing="2">AI · SOC ANALYST</text>
