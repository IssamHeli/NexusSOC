<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none" role="img" aria-label="NexusSOC">
  <defs>
    <linearGradient id="nx" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
  </defs>

  <!-- mark -->
  <g transform="translate(8 8)">
