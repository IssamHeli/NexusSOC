    <g stroke="url(#nx)" stroke-width="1.3" stroke-linecap="round" opacity="0.75">
      <line x1="32" y1="32" x2="32" y2="18"/>
      <line x1="32" y1="32" x2="44" y2="25"/>
      <line x1="32" y1="32" x2="44" y2="39"/>
      <line x1="32" y1="32" x2="32" y2="46"/>
      <line x1="32" y1="32" x2="20" y2="39"/>
      <line x1="32" y1="32" x2="20" y2="25"/>
    </g>
    <g fill="url(#nx)">
      <circle cx="32" cy="18" r="2.2"/>
      <circle cx="44" cy="25" r="2.2"/>
      <circle cx="44" cy="39" r="2.2"/>
      <circle cx="32" cy="46" r="2.2"/>
      <circle cx="20" cy="39" r="2.2"/>
      <circle cx="20" cy="25" r="2.2"/>
    </g>
    <circle cx="32" cy="32" r="3.6" fill="url(#nx)"/>
