services:

  ai-db:
    image: pgvector/pgvector:pg15
    container_name: ai-soc-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: nexussoc_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - ai-agent-api
    networks:
      - backend

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana_mac
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${DB_PASS}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioned-dashboards:ro
    depends_on:
      ai-db:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: nexussoc_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  ai-agent-api:
    build: ./ai_agent_src
    container_name: ai_agent_bridge
    restart: on-failure
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "8001:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health',timeout=5); d=__import__('json').loads(r.read()); sys.exit(0 if d['status'] in ('healthy','degraded') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      ai-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend

  worker:
    build: ./ai_agent_src
    command: python worker.py
    restart: on-failure
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_API_URL=http://ai-agent-api:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import redis,time,sys; r=redis.Redis.from_url('redis://redis:6379'); v=r.get('nexussoc:worker:heartbeat'); sys.exit(0 if v and time.time()-float(v)<90 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      redis:
        condition: service_healthy
      ai-agent-api:
        condition: service_healthy
    networks:
      - backend

  soc-frontend:
    build:
      context: ./soc-frontend
      target: dev
    container_name: soc_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./soc-frontend/src:/app/src
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - ai-agent-api
    networks:
      - frontend

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
